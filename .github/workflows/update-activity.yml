name: Update Recent Activity

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch recent commits and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: techniiopay
        run: |
          # Install GitHub CLI (already available on ubuntu-latest)
          REPOS=("api-niiopay" "app-niiopay" "app-crm-niiopay")
          
          ACTIVITY_SECTION=""
          
          for REPO in "${REPOS[@]}"; do
            # Get last 5 commits via GitHub API
            COMMITS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$ORG/$REPO/commits?per_page=5" \
              | jq -r '.[] | "| [`" + .sha[0:7] + "`](https://github.com/'"$ORG"'/$REPO/commit/" + .sha + ") | " + (.commit.message | split("\n")[0] | .[0:80]) + " | " + (.commit.author.date | split("T")[0]) + " |"')
            
            if [ -n "$COMMITS" ]; then
              ACTIVITY_SECTION+="
### 📦 $REPO
"
              ACTIVITY_SECTION+="| Commit | Mensaje | Fecha |
"
              ACTIVITY_SECTION+="|--------|---------|-------|
"
              ACTIVITY_SECTION+="$COMMITS
"
            fi
          done
          
          # Build the full replacement block
          NEW_BLOCK="<!-- ACTIVITY-START -->
${ACTIVITY_SECTION}
> ⚡ Actualizado automáticamente · [Ver todos los commits](https://github.com/$ORG)
<!-- ACTIVITY-END -->"
          
          # Replace content between markers in README
          python3 - <<'PYEOF'
          import re
          with open("profile/README.md", "r") as f:
              content = f.read()
          
          import subprocess
          new_block = subprocess.run(["bash", "-c", "printf '%s' \"$NEW_BLOCK\""], capture_output=True, text=True).stdout
          
          updated = re.sub(
              r'<!-- ACTIVITY-START -->.*?<!-- ACTIVITY-END -->',
              new_block,
              content,
              flags=re.DOTALL
          )
          
          with open("profile/README.md", "w") as f:
              f.write(updated)
          print("README updated successfully")
          PYEOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile/README.md
          git diff --staged --quiet || git commit -m "chore: update recent activity [skip ci]"
          git push
