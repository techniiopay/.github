name: Update Recent Activity

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update activity in README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const repos = ['api-niiopay', 'app-niiopay', 'app-crm-niiopay'];
            const org = 'techniiopay';
            let section = '';

            for (const repo of repos) {
              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner: org,
                  repo: repo,
                  per_page: 5
                });
                const emoji = repo === 'api-niiopay' ? '📦' : repo === 'app-niiopay' ? '📱' : '🗂️';
                section += '\n### ' + emoji + ' ' + repo + '\n';
                section += '| Commit | Mensaje | Fecha |\n';
                section += '|--------|---------|-------|\n';
                for (const c of commits) {
                  const sha = c.sha.substring(0, 7);
                  const msg = c.commit.message.split('\n')[0].substring(0, 80);
                  const date = c.commit.author.date.split('T')[0];
                  const url = 'https://github.com/' + org + '/' + repo + '/commit/' + c.sha;
                  section += '| [`' + sha + '`](' + url + ') | ' + msg + ' | ' + date + ' |\n';
                }
              } catch (e) {
                console.log('Error fetching ' + repo + ': ' + e.message);
              }
            }

            const footer = '\n> ⚡ Actualizado: ' + new Date().toISOString().split('T')[0] + ' · [Ver todos los commits](https://github.com/' + org + ')';
            const newBlock = '<!-- ACTIVITY-START -->' + section + footer + '\n<!-- ACTIVITY-END -->';

            let readme = fs.readFileSync('profile/README.md', 'utf8');
            const updated = readme.replace(/<!-- ACTIVITY-START -->[\s\S]*?<!-- ACTIVITY-END -->/, newBlock);
            fs.writeFileSync('profile/README.md', updated);
            console.log('README updated!');

      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add profile/README.md
          git diff --staged --quiet || git commit -m "chore: update recent activity [skip ci]"
          git push
